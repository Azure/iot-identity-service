[package]
name = "pkcs11"
version = "0.1.0"
license = "MIT"
authors = ["Azure IoT Edge Devs"]
edition = "2024"


[dependencies]
foreign-types-shared = { workspace = true }
libc = { workspace = true }
openssl = { workspace = true }
openssl-sys = { workspace = true }
percent-encoding = { workspace = true }
serde = { workspace = true, optional = true }

openssl2 = { path = "../../openssl2/" }
openssl-sys2 = { path = "../../openssl-sys2/" }
pkcs11-sys = { path = "../pkcs11-sys/" }


[build-dependencies]
openssl-build = { path = "../../openssl-build/" }


[dev-dependencies]
itertools = { workspace = true }


[lints]
workspace = true


[package.metadata.cargo-machete]
ignored = ["openssl-sys"] # We need this dependency so that our build.rs can see openssl-sys's version env var
